name: berkut

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: berkut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: berkut
      POSTGRES_USER: berkut
      POSTGRES_PASSWORD: berkut
    # Host port 5433 deliberately non-default — 5432 often clashes with a native
    # Postgres install on dev machines and auth errors from that clash are confusing.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berkut -d berkut"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: berkut-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka in KRaft mode (no Zookeeper). Single broker — for dev only.
  # Two listeners:
  #   PLAINTEXT  (kafka:29092)        — used by other Docker containers
  #   PLAINTEXT_HOST (localhost:9092) — used by apps running on host (gradle bootRun)
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: berkut-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # One-shot container: creates topics with explicit partition counts, then exits.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: berkut-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    # YAML list form keeps the multi-line script as a single argument to `bash -c`.
    # Plain `command: |` would word-split and pass each token separately.
    command:
      - |
        set -e
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic gps.points --partitions 12 --replication-factor 1 \
          --config retention.ms=86400000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic events.raw --partitions 6 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic events.deduped --partitions 6 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic events.critical --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic vehicles.registry --partitions 3 --replication-factor 1 \
          --config cleanup.policy=compact --config min.cleanable.dirty.ratio=0.01
        echo "--- topics ---"
        kafka-topics --bootstrap-server kafka:29092 --list

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: berkut-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: berkut
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kafka_data:
